    <title>Last Position</title>

<body>
  <ul id="infobox">
    <li>Log: <span id="log_id"/> </li>
    <li>Measure uid: <span id="user_location_id"/> </li>
    <li><i class="fa fa-wifi" aria-hidden="true"></i>: <span id="user_accuracy" /> </li>
    <li>Location source: <span id="user_provider" /> </li>

    <li>Latitude: <span id="user_latitude" /> </li>
    <li>Longitude: <span id="user_longitude" /> </li>
    <li>Altitude: <span id="user_altitude" /> </li>

    <li>Speed: <span id="user_speed" /> </li>
    <li><i class="fa fa-compass" aria-hidden="true"></i>: <span id="user_heading" /> </li>

    <li><i class="fa fa-battery-three-quarters" aria-hidden="true"></i>: <span id="user_battery" /> </li>

    <li>Device Timestamp: <span id="user_device_timestamp" /> </li>
    <li>Server Timestamp: <span id="user_server_timestamp" /> </li>

  </ul>

<p>
  <a href="" id="osm_link">Openstreetmap link</a>
</p>

 <div id="map"></div>

 <div>
   <ol id="detailed-coords">
   </ol>
 </div>

</body>

<script type="module">
  const queryString = window.location.search;
  const urlParams = new URLSearchParams(queryString);

  if (urlParams.get('sec') == '1') {
    await load_last_position_sec(urlParams.get('u'));
  } else {
    await load_last_position(urlParams.get('u'));  
  }
    
</script>
